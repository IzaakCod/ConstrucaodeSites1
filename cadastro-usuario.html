<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
</head>

<body>
    <h1>Cadastro de Usuário</h1>


    <form action="https://www.w3schools.com/action_page.php" method="POST">
            <input type="hidden" name="id" value="10">
            Nome: <input type="text" name="nome" minlength="5" maxlength="10" required ><br>
            CPF: <input type="text" name="cpf"><br>
            Data de nascimento: <input type="date" name="dataNascimento"><br>
            Gênero:<br>
            <input type="radio" name="genero" value="M" checked> Masculino<br>
            <input type="radio" name="genero" value="F"> Feminino<br>
            <input type="radio" name="genero" value="N"> Prefiro não informar<br>
            Hobbies:<br>
            <input type="checkbox" name="hobby" value="bocha"> Bocha<br>
            <input type="checkbox" name="hobby" value="gamao"> Gamão<br>
            <input type="checkbox" name="hobby" value="bingo"> Bingo<br>
            Foto: <input type="file" name="foto" accept="image/*"><br>
            <input type="submit" value="Cadastrar Usuário">
    </form>


</body>

</html>
